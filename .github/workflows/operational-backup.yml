name: Operational Backup

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  run-backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
      BACKUP_CRON_SECRET: ${{ secrets.BACKUP_CRON_SECRET }}
    steps:
      - name: Validate required secrets
        run: |
          test -n "$BACKEND_BASE_URL"
          test -n "$BACKUP_CRON_SECRET"

      - name: Trigger operational backup and verification
        run: |
          curl --fail-with-body --silent --show-error \
            --retry 3 \
            --retry-all-errors \
            --max-time 180 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-backup-cron-secret: $BACKUP_CRON_SECRET" \
            "${BACKEND_BASE_URL%/}/admin/internal/backup/run" \
            --data '{"verify":true}'
